name: Cleanup Old Releases

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete releases older than 7 days
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          REPO="AnyaKernel/Kernel-Release"
          CUTOFF=$(date -d "7 days ago" --utc +%Y-%m-%dT%H:%M:%SZ)

          STALE=$(gh release list \
            --repo "$REPO" \
            --limit 200 \
            --json tagName,createdAt \
            | jq -r --arg cutoff "$CUTOFF" \
            '.[] | select(.createdAt < $cutoff) | .tagName')

          if [[ -z "$STALE" ]]; then
            echo "Tidak ada release yang perlu dihapus."
            exit 0
          fi

          while IFS= read -r TAG; do
            echo "Menghapus: $TAG"
            gh release delete "$TAG" \
              --repo "$REPO" \
              --yes --cleanup-tag 2>/dev/null && echo "✓ $TAG" || echo "✗ $TAG gagal"
          done <<< "$STALE"
